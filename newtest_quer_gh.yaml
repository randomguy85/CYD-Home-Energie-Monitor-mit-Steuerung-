####################################################################################################
#                                                                                                  #
#        Heim-Monitoring mit 5 Schaltflächen                                                      #                                                                          
#                                                                                                  #
####################################################################################################
esphome:
  name: smartdisplay2
  friendly_name: CYD - SmartDisplay2

##################################################################################
# Hier die ESP-Variante definieren ESP32, ESP32-S3 etc.
##################################################################################
esp32:
  board: esp32dev
  framework:
    type: arduino

##################################################################################
# Logging Ja/Nein
##################################################################################
logger:

##################################################################################
# Link zum API-Key in der secret.yaml
##################################################################################
api:
  encryption:
    key: !secret smartdisplay2_api_key

##################################################################################
# OTA-Update - Passwort in der secret.yaml
##################################################################################
ota:
  - platform: esphome
    password: !secret ota_password

##################################################################################
# WIFI - Passwort in der secret.yaml
##################################################################################
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ##################################################################################
  # Fallback-Hotspot mit Passwort in der secret.yaml
  ##################################################################################
  ap:
    ssid: "Smartdisplay2 Fallback Hotspot"
    password: !secret wifi_ap_password

captive_portal:

##################################################################################
# Backlight-Pin und RGB-LED konfigurieren - wichtig für korrekte Farbdarstellung
##################################################################################
output:
  - platform: ledc
    pin: GPIO21
    id: backlight_pwm
  - platform: ledc
    id: output_red
    pin: GPIO4
    inverted: true
  - platform: ledc
    id: output_green
    pin: GPIO16
    inverted: true
  - platform: ledc
    id: output_blue
    pin: GPIO17
    inverted: true

light:
  - platform: monochromatic
    output: backlight_pwm
    name: Display Backlight
    id: backlight
    restore_mode: ALWAYS_ON
  - platform: rgb
    name: LED
    red: output_red
    id: led
    green: output_green
    blue: output_blue
    restore_mode: ALWAYS_OFF

##################################################################################
# SPI-Busse konfigurieren.
# Der ESP32-2432S028R verwendet separate SPI-Busse für Display und Touch
##################################################################################
spi:
  - id: tft
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12
  - id: touch
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39

touchscreen:
  platform: xpt2046
  spi_id: touch
  cs_pin: GPIO33
  interrupt_pin: GPIO36
  update_interval: 50ms
  threshold: 400
  calibration:
    x_min: 280
    x_max: 3860
    y_min: 340
    y_max: 3860
  transform:
    swap_xy: true
    mirror_x: true
    mirror_y: true

##################################################################################
